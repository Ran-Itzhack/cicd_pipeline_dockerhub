name: ci-pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

###
# Optional: prevent multiple CI runs for the same ref
###
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Validate Terraform in tf_enviournments ---
  terraform_validate_configuration:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tf_enviournments
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.1.7"
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt #-check -recursive -diff

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # Build Artifact Repository: push docker image to Docker Hub or Amazon ECR store 
  # --- Build application and produce artifact for CD --- containerization
  build_artifact_docker_image:
    name: Build Artifact Image and Push to Docker Hub
    needs: [ terraform_validate_configuration ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub 
        uses: docker/login-action@v4
        with: 
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/cicd_pipeline_dockerhub
          # Adds 'latest' and the commit SHA as tags automatically
          tags: |
            type=schedule, pattern={{date 'YYYYMMDD'}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Print Docker metadata
        run: |
          echo "Docker metadata: ${{ steps.meta.outputs }}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64, linux/arm64
          # Note: metadata-action handles the image name + tags together
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}  
          # tags: prabhushan/test-service:${{ github.ref_name }}-${{ github.sha }}


# Upload Build Data to Artifact Repository
      - name: Upload Build Data
        uses: actions/upload-artifact@v4
        with:
          name: artifact_build_data_1
          path: .
          if-no-files-found: error

  # --- Unit / integration tests ---
  unit_tests:
    name: Unit tests
    needs: [ terraform_validate_configuration, build_artifact_docker_image ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          echo "Running unit tests..."
          # Add your test commands here, e.g.:
          # npm test
          # pytest
          # go test ./...

  # --- Security scan ---
  security-scan:
    name: Security scan
    needs: [ terraform_validate_configuration, build_artifact_docker_image, unit_tests ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run security checks
        run: |
          echo "Running security scan..."
          # Optional: add Trivy, CodeQL, or other scanners

  # --- Gate: workflow only succeeds when all jobs pass (CD runs on workflow_run success) ---
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [terraform_validate_configuration, build_artifact_docker_image, unit_tests, security-scan]
    steps:
      - run: echo "All CI jobs completed successfully."
